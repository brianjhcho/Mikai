version: "3.8"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: mikai-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/mikai-local-dev
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "mikai-local-dev", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphiti-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mikai-graphiti
    ports:
      - "8100:8100"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mikai-local-dev
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MIKAI_DB_PATH=/data/mikai.db
    volumes:
      - ${HOME}/.mikai:/data:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
